name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: fastapi4jq:smoke
          provenance: false
          sbom: false

      - name: Create smoke test network
        run: docker network create fastapi4jq-net

      - name: Start Redis for smoke test
        run: docker run -d --name fastapi4jq-redis --network fastapi4jq-net redis:7-alpine

      - name: Start app container for smoke test
        run: |
          docker run -d --name fastapi4jq-app --network fastapi4jq-net -p 8000:8000 \
            -e SECRET_TOKEN=ci_smoke_test_token_123456 \
            -e REDIS_HOST=fastapi4jq-redis \
            -e REDIS_PORT=6379 \
            fastapi4jq:smoke

      - name: Wait for livez
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/livez > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker ps -a
          docker logs fastapi4jq-app
          docker logs fastapi4jq-redis
          exit 1

      - name: Check readyz
        shell: bash
        run: |
          curl -fsS -H "x-token: ci_smoke_test_token_123456" http://127.0.0.1:8000/readyz > /dev/null

      - name: Stop smoke test containers
        if: always()
        run: |
          docker rm -f fastapi4jq-app fastapi4jq-redis || true
          docker network rm fastapi4jq-net || true

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          sbom: false
